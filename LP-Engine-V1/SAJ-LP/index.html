            renderTestimonials,

        ];

        // Jalankan seluruh Component sesuai urutan queue
        const runRenderEngine = () => {
            const app = document.getElementById('app');
            const html = ENGINE.renderQueue.map(fn => {
                try {
                    return fn();
                } catch (e) {
                    console.error('[LP Engine] Error rendering ' + fn.name + ':', e);
                    return '';
                }
            }).join('');
            app.innerHTML = html;
        };


        /****************************************************************
800 APP INITIALIZATION
Website mulai berjalan dari sini.
Urutan: Render -> Library Init.
SAFE TO EDIT: NO
****************************************************************/

        // Inisialisasi seluruh library eksternal
        const initLibraries = () => {

            // AOS (Animasi Scroll)
            try {
                AOS.init({ duration: 800, once: true, offset: 50 });
            } catch (e) {
                console.error('[LP Engine] AOS gagal diinisialisasi:', e);
            }

            // Swiper (Carousel Testimoni — Preview Slider)
            try {
                new Swiper('.mySwiper', {
                    slidesPerView: 1,
                    spaceBetween: 20,
                    grabCursor: true,
                    centeredSlides: false,
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                    breakpoints: {
                        576: { slidesPerView: 2, spaceBetween: 16 },
                        992: { slidesPerView: 3, spaceBetween: 20 },
                        1200: { slidesPerView: 4, spaceBetween: 20 },
                    }
                });
            } catch (e) {
                console.error('[LP Engine] Swiper gagal diinisialisasi:', e);
            }

            // CountUp.js (Angka Statistik Hero)
            try {
                if (typeof countUp !== 'undefined') {
                    const yearCount = new countUp.CountUp('count-year', config.hero.stats.year, { useGrouping: false, duration: 2.5 });
                    if (!yearCount.error) { yearCount.start(); } else { console.error(yearCount.error); }

                    const customersCount = new countUp.CountUp('count-customers', config.hero.stats.customers, { duration: 3 });
                    if (!customersCount.error) { customersCount.start(); } else { console.error(customersCount.error); }
                }
            } catch (e) {
                console.error('[LP Engine] CountUp gagal diinisialisasi:', e);
            }

            // Typed.js (Animasi Teks Rating)
            try {
                if (typeof Typed !== 'undefined') {
                    new Typed('#typed-rating', {
                        strings: [config.hero.stats.rating],
                        typeSpeed: 50,
                        showCursor: false,
                    });
                }
            } catch (e) {
                console.error('[LP Engine] Typed.js gagal diinisialisasi:', e);
            }
        };

        // Entry point aplikasi
        document.addEventListener('DOMContentLoaded', () => {
            const startTime = Date.now();
            runRenderEngine();
            initLibraries();

            // Selesai Loading Screen Animation
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && config.loadingScreen && config.loadingScreen.enabled) {
                const minDuration = config.loadingScreen.minDuration || 600;
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, minDuration - elapsedTime);

                setTimeout(() => {
                    loadingScreen.classList.add('fade-out');
                    setTimeout(() => {
                        loadingScreen.remove();
                    }, 600);
                }, remainingTime);
            } else if (loadingScreen) {
                loadingScreen.remove();
            }
        });
