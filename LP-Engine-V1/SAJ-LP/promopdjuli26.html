                    ${config.topBar.text}
                </div>
            `;
        };
        ENGINE.registry.push({ name: 'renderTopBar', fn: renderTopBar, description: 'Top Bar Promo Banner' });


        // 2. Promo Hero Component (Flyer dipindah mengambang di bawah CTA)
        const renderPromoHero = () => {
            const c = config.campaign;
            const waUrl = createWaLink(config.whatsapp, c.whatsappMessage);

            return `
                <section class="promo-hero-section">
                    <div class="container text-center text-lg-start position-relative" style="z-index: 2;">
                        <div class="row align-items-center">
                            <div class="col-lg-8 mx-auto text-center" data-aos="fade-up">
                                <div class="promo-badge mb-3">
                                    <i class="fa-solid fa-fire text-secondary-saj"></i> ${c.badge}
                                </div>
                                <h1 class="display-5 fw-bold text-white mb-3">
                                    ${c.title}
                                </h1>
                                <p class="lead text-white-50 mb-4 px-md-4">
                                    ${c.subtitle}
                                </p>
                                
                                <div class="promo-period-box mb-4">
                                    <i class="fa-regular fa-clock me-2 text-secondary-saj"></i>
                                    <span class="text-white fw-bold">${c.periodText}</span>
                                </div>

                                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                                    <a href="${waUrl}" target="_blank" class="btn btn-secondary-saj btn-wa-pulse fs-5">
                                        <i class="fa-brands fa-whatsapp fs-4"></i> Klaim Diskon Promo Sekarang
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Flyer Parallax Mengambang Di Perbatasan BG Hijau & Putih -->
                    ${c.flyerImage ? `<img src="${c.flyerImage}" alt="Flyer Promo SAJ" class="hero-parallax-flyer" id="heroParallaxFlyer">` : ''}
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoHero', fn: renderPromoHero, description: 'Promo Hero Banner' });


        // 3. Benefit Promo Component
        const renderPromoBenefits = () => {
            const benefits = config.campaign.benefits;
            if (!benefits || !benefits.length) return '';

            const itemsHtml = benefits.map((item, idx) => `
                <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="${idx * 100}">
                    <div class="benefit-card">
                        <div class="benefit-icon-box">
                            <i class="${item.icon}"></i>
                        </div>
                        <h5 class="fw-bold text-primary-saj mb-2">${item.title}</h5>
                        <p class="text-muted small mb-0">${item.desc}</p>
                    </div>
                </div>
            `).join('');

            return `
                <section class="py-5 bg-light benefit-section">
                    <div class="container py-4">
                        <div class="text-center mb-5" data-aos="fade-up">
                            <span class="text-secondary-saj fw-bold text-uppercase tracking-wider">Keuntungan Spesial</span>
                            <h2 class="fw-bold text-primary-saj mt-1">Benefit Ekstra Selama Promo</h2>
                            <p class="text-muted">Dapatkan berbagai bonus tambahan tanpa biaya tersembunyi</p>
                        </div>
                        <div class="row g-4">
                            ${itemsHtml}
                        </div>
                    </div>
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoBenefits', fn: renderPromoBenefits, description: 'Benefit Promo Section' });


        // 4. Promo Packages Component
        const renderPromoPackages = () => {
            const packages = config.campaign.packages;
            if (!packages || !packages.length) return '';

            const cardsHtml = packages.map((pkg, idx) => {
                const waMsg = `Halo SAJ, saya berminat dengan ${pkg.name} (${formatRupiah(pkg.promoPrice)}). Mohon info lengkapnya 🙏`;
                const waUrl = createWaLink(config.whatsapp, waMsg);

                const featuresHtml = pkg.features.map(f => `
                    <li class="mb-2 d-flex align-items-center gap-2 small text-secondary-dark">
                        <i class="fa-solid fa-circle-check text-success"></i> ${f}
                    </li>
                `).join('');

                return `
                    <div class="col-lg-4" data-aos="fade-up" data-aos-delay="${idx * 150}">
                        <div class="promo-package-card ${pkg.popular ? 'popular' : ''} p-4">
                            ${pkg.badge ? `<div class="package-badge-top">${pkg.badge}</div>` : ''}
                            
                            <h4 class="fw-bold text-primary-saj mb-1">${pkg.name}</h4>
                            <div class="text-muted small mb-3"><i class="fa-solid fa-box-open me-1"></i> ${pkg.portion}</div>
                            
                            <div class="mb-3 p-3 rounded bg-light">
                                <div class="price-normal mb-1">Harga Normal: ${formatRupiah(pkg.normalPrice)}</div>
                                <div class="price-promo mb-1">${formatRupiah(pkg.promoPrice)}</div>
                                <div class="savings-badge mb-1">
                                    <i class="fa-solid fa-tags me-1"></i> Hemat ${formatRupiah(pkg.savings)}
                                </div>
                                <div class="savings-domba-badge">
                                    <i class="fa-solid fa-tags me-1"></i> + ${formatRupiah(pkg.savings_domba)} *Jika Upgrade Domba Jantan
                                </div>
                            </div>

                            <ul class="list-unstyled mb-4 flex-grow-1">
                                ${featuresHtml}
                            </ul>

                            <a href="${waUrl}" target="_blank" class="btn ${pkg.popular ? 'btn-secondary-saj' : 'btn-primary-saj'} w-100 mt-auto">
                                <i class="fa-brands fa-whatsapp"></i> Ambil Paket Promo
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <section class="py-5">
                    <div class="container py-4">
                        <div class="text-center mb-5" data-aos="fade-up">
                            <span class="badge bg-secondary-saj text-dark px-3 py-2 rounded-pill fw-bold mb-2">Pilihan Terbaik</span>
                            <h2 class="fw-bold text-primary-saj">Paket Aqiqah Spesial Promo</h2>
                            <p class="text-muted">Harga spesial potongan langsung hanya selama masa promo</p>
                        </div>
                        <div class="row g-4 align-items-stretch">
                            ${cardsHtml}
                        </div>
                    </div>
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoPackages', fn: renderPromoPackages, description: 'Promo Packages Section' });


        // 5. Cara Klaim Promo Component
        const renderPromoClaimSteps = () => {
            const steps = config.campaign.steps;
            if (!steps || !steps.length) return '';

            const stepsHtml = steps.map((s, idx) => `
                <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="${idx * 100}">
                    <div class="step-card text-center">
                        <div class="step-num-badge mx-auto">${s.num}</div>
                        <i class="${s.icon} fs-2 text-primary-saj mb-3"></i>
                        <h5 class="fw-bold text-primary-saj mb-2">${s.title}</h5>
                        <p class="text-muted small mb-0">${s.desc}</p>
                    </div>
                </div>
            `).join('');

            return `
                <section class="py-5 bg-light">
                    <div class="container py-4">
                        <div class="text-center mb-5" data-aos="fade-up">
                            <span class="text-secondary-saj fw-bold text-uppercase">Mudah & Cepat</span>
                            <h2 class="fw-bold text-primary-saj mt-1">4 Langkah Mudah Klaim Promo</h2>
                            <p class="text-muted">Proses pemesanan praktis langsung via WhatsApp</p>
                        </div>
                        <div class="row g-4">
                            ${stepsHtml}
                        </div>
                    </div>
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoClaimSteps', fn: renderPromoClaimSteps, description: 'Claim Steps Section' });


        // 6. Syarat & Ketentuan Component
        const renderPromoTerms = () => {
            const terms = config.campaign.terms;
            if (!terms || !terms.length) return '';

            const termsList = terms.map(t => `
                <li class="mb-3 d-flex align-items-start gap-3">
                    <i class="fa-solid fa-circle-info text-secondary-saj fs-5 mt-1"></i>
                    <span class="text-secondary-dark">${t}</span>
                </li>
            `).join('');

            return `
                <section class="py-5">
                    <div class="container">
                        <div class="row justify-content-center">
                            <div class="col-lg-9" data-aos="fade-up">
                                <div class="terms-box">
                                    <h4 class="fw-bold text-primary-saj mb-4 text-center">
                                        <i class="fa-solid fa-file-contract me-2 text-secondary-saj"></i> Syarat & Ketentuan Promo
                                    </h4>
                                    <ul class="list-unstyled mb-0">
                                        ${termsList}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoTerms', fn: renderPromoTerms, description: 'Terms & Conditions Section' });


        // 7. CTA Penutup Component
        const renderPromoClosingCTA = () => {
            const cta = config.campaign.closingCTA;
            const waUrl = createWaLink(config.whatsapp, config.campaign.whatsappMessage);

            return `
                <section class="py-5 bg-primary-saj text-white text-center position-relative">
                    <div class="container py-4 position-relative" style="z-index: 2;" data-aos="zoom-in">
                        <h2 class="fw-bold mb-3">${cta.heading}</h2>
                        <p class="lead text-white-50 mb-4 mx-auto" style="max-width: 650px;">${cta.subheading}</p>
                        <a href="${waUrl}" target="_blank" class="btn btn-secondary-saj btn-wa-pulse fs-5">
                            <i class="fa-brands fa-whatsapp fs-4"></i> ${cta.buttonText}
                        </a>
                    </div>
                </section>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoClosingCTA', fn: renderPromoClosingCTA, description: 'Closing CTA Section' });

        /****************************************************************
COMPONENT: renderBottomBar
DESCRIPTION: Bottom bar non-floating di paling bawah halaman dengan warna hijau SAJ.
DEPENDS_ON: config.bottomBar
SAFE TO EDIT: YES
****************************************************************/
        const renderBottomBar = () => {
            if (!config.bottomBar || !config.bottomBar.enabled) return '';
            return `
                <div class="bottom-bar-saj text-center">
                    <div class="container">
                        <a href="${config.bottomBar.link}" class="d-inline-block text-decoration-none">
                        ${config.bottomBar.text}
                        </a>
                    </div>
                </div>
            `;
        };
        ENGINE.registry.push({ name: 'renderBottomBar', fn: renderBottomBar, description: 'Bottom bar promo non-floating' });

        // 8. Footer Component
        const renderPromoFooter = () => {
            const waUrl = createWaLink(config.whatsapp, config.campaign.whatsappMessage);
            return `
                <footer class="py-4 bg-dark text-white-50 text-center small">
                    <div class="container">
                        <p class="mb-0">${config.footer.copyright}</p>
                    </div>
                </footer>
                
                <!-- Floating WhatsApp CTA Button -->
                <a href="${waUrl}" class="floating-wa" target="_blank" aria-label="Klaim Promo WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            `;
        };
        ENGINE.registry.push({ name: 'renderPromoFooter', fn: renderPromoFooter, description: 'Footer Component' });


        /****************************************************************
        700 RENDER ENGINE
        Menyusun seluruh komponen promo menjadi halaman utuh.
        SAFE TO EDIT: NO
        ****************************************************************/
        ENGINE.renderQueue = [
            renderTopBar,
            renderPromoHero,
            renderPromoBenefits,
            renderPromoPackages,
            renderPromoClaimSteps,
            renderPromoTerms,
            renderPromoClosingCTA,
            renderBottomBar,
            renderPromoFooter
        ];

        const runRenderEngine = () => {
            const app = document.getElementById('app');
            const html = ENGINE.renderQueue.map(fn => {
                try {
                    return fn();
                } catch (e) {
                    console.error('[LP Engine] Error rendering ' + fn.name + ':', e);
                    return '';
                }
            }).join('');
            app.innerHTML = html;
        };


        /****************************************************************
        800 APP INITIALIZATION
        Entry point inisialisasi aplikasi promo.html.
        SAFE TO EDIT: NO
        ****************************************************************/
        document.addEventListener('DOMContentLoaded', () => {
            const startTime = Date.now();
            runRenderEngine();

            // Parallax Scroll Effect untuk Flyer di Antara Hero & Benefit
             const flyerEl = document.getElementById('heroParallaxFlyer');
            if (flyerEl) {
                window.addEventListener('scroll', () => {
                    const scrolled = window.scrollY;
                    if (scrolled < 1000) {
                        const speed = 0.05; // Gerakan parallax yang halus & elegan
                        const yPos = scrolled * speed;
                        flyerEl.style.transform = `translate(-50%, ${yPos}px) rotate(-4deg)`;
                    }
                });
            }

            // Init AOS Animation Library
            try {
                if (typeof AOS !== 'undefined') {
                    AOS.init({ duration: 800, once: true, offset: 50 });
                }
            } catch (e) {
                console.error('[LP Engine] AOS init error:', e);
            }

            // Selesai Loading Screen Animation
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && config.loadingScreen && config.loadingScreen.enabled) {
                const minDuration = config.loadingScreen.minDuration || 600;
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, minDuration - elapsedTime);

                setTimeout(() => {
                    loadingScreen.classList.add('fade-out');
                    setTimeout(() => {
                        loadingScreen.remove();
                    }, 600);
                }, remainingTime);
            } else if (loadingScreen) {
                loadingScreen.remove();
            }
        });
    </script>
</body>

</html>
